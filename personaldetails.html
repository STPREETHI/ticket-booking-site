<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ticket Booking</title>
</head>
<body><center>
<div class="container">
    <h2>Ticket Booking</h2>
 <form action= "C:\Users\PREETHI\Documents\project\ticketsite.html"method="post" onsubmit="return validateForm()">
    <form id="bookingForm">
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required>
<br><br><br>
        <label for="age">Age:</label>
        <input type="number" id="age" name="age" required>
<br><br><br>
        <label for="numTickets">Number of Tickets:</label>
        <input type="number" id="numTickets" name="numTickets" min="1" required>
<br><br><br>
        <label for="disability">Person with Disability:</label>
        <input type="checkbox" id="disability" name="disability">
<br><br><br>
        <label for="seatPreference">Seat Preference:</label>
        <select id="seatPreference" name="seatPreference">
            <option value="sleeper">Sleeper</option>
            <option value="semiSleeper">Semi Sleeper</option>
            <option value="seater">Seater</option>
        </select>
<br><br><br>
        <button type="button" onclick="calculateCost()">Calculate Cost</button>

        <p id="totalCost">Total Cost: $0</p>
<br><br><br>
<button><a href="C:\Users\PREETHI\Documents\project\ticketsite.html"><b>SUBMIT</b></a></button>
    </form>

    <script>
        function calculateCost() {
            var numTickets = document.getElementById('numTickets').value;
            var baseCost = 300;
            var totalCost = numTickets * baseCost;

            // Applying a discount for people with disabilities
            if (document.getElementById('disability').checked) {
                totalCost *= 0.8; // 20% discount for people with disabilities
            }

            document.getElementById('totalCost').innerHTML = 'Total Cost: $' + totalCost.toFixed(2);
        }
    </script>
</div>
<center>
</body>
</html>
